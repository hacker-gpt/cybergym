<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CyberGym</title>
  <meta name="description" content="CyberGym — a deliberately insecure web app for security training and CTFs">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link id="favicon" rel="icon" type="image/x-icon" href="assets/public/favicon_cybergym.ico">
  <link rel="stylesheet" type="text/css" href="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.1.0/cookieconsent.min.css" />
  <script src="//cdnjs.cloudflare.com/ajax/libs/cookieconsent2/3.1.0/cookieconsent.min.js"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script>
    window.addEventListener("load", function(){
      window.cookieconsent.initialise({
        "palette": {
          "popup": { "background": "var(--theme-primary-dark)", "text": "var(--theme-text)" },
          "button": { "background": "var(--theme-accent)", "text": "var(--theme-text)" }
        },
        "theme": "classic",
        "position": "bottom-right",
        "content": { "message": "This site uses cookies to give you the most exploitable browsing experience.", "dismiss": "Got it!", "link": "Learn more", "href": "/#/scores" }
      })});
  </script>
</head>
<body class="mat-app-background mat-typography cybergym-dark-theme">
  <app-root></app-root>
</body>
</html>
